<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="../../css/calculator/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=backspace"
    />
  </head>
  <body>
    <main>
      <span id="title-text">Calculator</span>
      <section id="display">
        <div id="input">124+32</div>
        <div id="output">123</div>
      </section>
      <section id="keypad">
        <button>%</button>
        <button>C</button>
        <button>
          <span class="material-symbols-outlined"> backspace </span>
        </button>
        <button>/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button>.</button>
        <button>0</button>
        <button>=</button>
      </section>
    </main>
    <script src="../../Script/calculator/script.js"></script>
  </body>
</html>
