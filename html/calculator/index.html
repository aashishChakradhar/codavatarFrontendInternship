<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="../../css/calculator/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=backspace"
    />
  </head>
  <body>

    <main>
      <span id="title-text">Calculator</span>
      <section id="display">
        <input id="input"></input>
        <div id="output"></div>
      </section>
      <section id="keypad">
        <button class="symbol">%</button>
        <button id="clear">C</button>
        <button>
          <span class="material-symbols-outlined"> backspace </span>
        </button>
        <button class="symbol">/</button>

        <button class="numbers">7</button>
        <button class="numbers">8</button>
        <button class="numbers">9</button>
        <button class="symbol">*</button>

        <button class="numbers">4</button>
        <button class="numbers">5</button>
        <button class="numbers">6</button>
        <button class="symbol">-</button>

        <button class="numbers">1</button>
        <button class="numbers">2</button>
        <button class="numbers">3</button>
        <button class="symbol">+</button>

        <button>.</button>
        <button class="numbers">0</button>
        <button>=</button>
      </section>
    </main>

    <script src="../../Script/calculator/script.js"></script>
  </body>
</html>
