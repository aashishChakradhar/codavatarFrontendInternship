      .arrow_button {
        display: inline-block;
        border-radius: 4px;
        background-color: #f4511e;
        border: none;
        color: #ffffff;
        text-align: center;
        font-size: 28px;
        padding: 20px;
        width: 200px;
        cursor: pointer;
      }

      .arrow_button span {
        display: inline-block;
        position: relative;
        transition: 0.5s;
      }

      /* .arrow_button span:after {
        content: "\00bb";
        position: absolute;
        opacity: 0;
        right: -20px;
        transition: 0.5s;
      } */

      .arrow_button:hover span {
        padding-right: 25px;
      }

      .arrow_button:hover span:after {
        opacity: 1;
        right: 0;
      }
    </style>
  </head>
  <body>
    <!-- <button class="press_button">Click here</button> -->
    <button class="arrow_button" style="vertical-align: middle">
      <span>Hover </span>
    </button>
  </body>
