<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position</title>
    <style>
      .parent {
        background: rgba(255, 0, 0, 0.4);
        height: 600px;
        width: 600px;
        padding: 30px;
        border: 2px solid black;
      }
      .child {
        padding: 30px;
        border: 2px solid black;
        background-color: blue;
        padding: 30px;
        position: relative;
      }
      .element {
        background-color: green;
        padding: 30px;
        border: 2px solid #000;
        position: absolute;
        top: 0px;
        left: 0px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      parent
      <div class="child">
        child
        <div class="element"></div>
      </div>
    </div>
  </body>
</html>
